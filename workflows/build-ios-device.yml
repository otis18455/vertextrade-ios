name: Build iOS IPA for Device

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: List Available SDKs
      run: xcodebuild -showsdks
    
    - name: Build .app Bundle for Device
      run: |
        # Build the app for generic iOS device (no signing)
        xcodebuild \
          -project VertexTrade.xcodeproj \
          -scheme VertexTrade \
          -sdk iphoneos \
          -configuration Release \
          build \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGN_ENTITLEMENTS="" \
          | tee build.log
        
        # Find the built product
        echo "Looking for built app..."
        find ~/Library/Developer/Xcode/DerivedData -name "VertexTrade.app" -type d 2>/dev/null || true
    
    - name: Package as IPA
      run: |
        # Create Payload directory
        mkdir -p Payload
        
        # Find and copy the .app
        APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "VertexTrade.app" -type d 2>/dev/null | head -1)
        
        if [ -z "$APP_PATH" ]; then
          echo "Error: Could not find built .app"
          echo "Build log:"
          cat build.log | tail -100
          exit 1
        fi
        
        echo "Found app at: $APP_PATH"
        cp -R "$APP_PATH" Payload/
        
        # Create IPA
        zip -r VertexTrade.ipa Payload
        
        # Verify
        ls -lh VertexTrade.ipa
        unzip -l VertexTrade.ipa | head -20
    
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: VertexTrade-IPA-Unsigned
        path: VertexTrade.ipa
        retention-days: 30
    
    - name: Upload Build Log (on failure)
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: Build-Log
        path: build.log
