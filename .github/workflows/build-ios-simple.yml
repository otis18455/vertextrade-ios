name: Build iOS App (Simple)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Build for Simulator (No Signing Needed)
      run: |
        # Build for iPhone simulator (no code signing required)
        xcodebuild \
          -project VertexTrade.xcodeproj \
          -scheme VertexTrade \
          -sdk iphonesimulator \
          -destination 'platform=iOS Simulator,name=iPhone 15' \
          build \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO
    
    - name: Create Payload Directory
      run: |
        # Create IPA structure manually
        mkdir -p Payload
        
        # Find the built app
        APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "VertexTrade.app" -type d | head -1)
        echo "Found app at: $APP_PATH"
        
        # Copy to Payload
        cp -R "$APP_PATH" Payload/
        
        # Create IPA
        zip -r VertexTrade.ipa Payload
        
        # Check result
        ls -la VertexTrade.ipa
    
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: VertexTrade-IPA
        path: VertexTrade.ipa
        retention-days: 30
