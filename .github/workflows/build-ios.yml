name: Build VertexTrade IPA

  on:
    workflow_dispatch:

  jobs:
    build:
      runs-on: macos-13

      steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build
        run: |
          xcodebuild -project VertexTrade.xcodeproj -configuration Release -destination 'generic/platform=iOS' build
  CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

      - name: Create IPA
        run: |
          mkdir -p Payload
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "VertexTrade.app" -type d | head -1)
          cp -R "$APP" Payload/
          zip -r VertexTrade.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: VertexTrade-IPA
          path: VertexTrade.ipa
