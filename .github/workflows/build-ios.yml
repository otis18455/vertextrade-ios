name: Build VertexTrade IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.0'
    
    - name: Build for iPhone (Real Device)
      run: |
        # Build for real iOS devices (not simulator)
        # iPhone 12+ supports iOS 14+
        xcodebuild \
          -project VertexTrade.xcodeproj \
          -scheme VertexTrade \
          -sdk iphoneos \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          build \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          IPHONEOS_DEPLOYMENT_TARGET=14.0
    
    - name: Create IPA
      run: |
        # Find the built app
        APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "VertexTrade.app" -type d | head -1)
        
        if [ -z "$APP_PATH" ]; then
          echo "ERROR: Could not find built app"
          find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d
          exit 1
        fi
        
        echo "Found app at: $APP_PATH"
        
        # Create IPA structure
        mkdir -p Payload
        cp -R "$APP_PATH" Payload/
        
        # Create IPA file
        zip -r VertexTrade.ipa Payload
        
        echo "IPA created successfully:"
        ls -lh VertexTrade.ipa
    
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: VertexTrade-IPA-iPhone
        path: VertexTrade.ipa
